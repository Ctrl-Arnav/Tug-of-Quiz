<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://fav.farm/🪢" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tug of Quiz - Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0a1628; overflow: hidden; }
        #root {
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
            background: #0a1628; position: relative;
        }
        .panel {
            position: absolute; top: 0; bottom: 0; width: 280px; display: flex; flex-direction: column;
            padding: 20px; z-index: 10; gap: 10px; display: none; /* Hidden until team assigned */
        }
        #panel-red { 
            left: 0; 
            background: rgba(10, 18, 40, 0.9); 
            border-right: 1px solid rgba(239,68,68,0.3); 
            justify-content: flex-start;
            padding-top: 80px;
        }
        #panel-blue { 
            right: 0; 
            background: rgba(10, 18, 40, 0.9); 
            border-left: 1px solid rgba(59,130,246,0.3); 
            justify-content: flex-end;
            padding-bottom: 80px;
        }
        .panel-label {
            font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; text-align: center;
            padding: 6px 12px; border-radius: 999px; margin-bottom: 8px;
        }
        .panel-label.red { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .panel-label.blue { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .q-text {
            font-size: 18px; font-weight: 600; text-align: center; color: #f8fafc;
            min-height: 60px; display: flex; align-items: center; justify-content: center; line-height: 1.4;
        }
        .ans-input {
            width: 100%; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 12px; font-size: 18px; text-align: center; background: rgba(255,255,255,0.05);
            color: #ffffff; outline: none; transition: all 0.2s;
        }
        .ans-input.red:focus { border-color: #ef4444; background: rgba(239,68,68,0.05); }
        .ans-input.blue:focus { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
        .feedback { height: 24px; font-size: 14px; font-weight: 600; text-align: center; }
        .feedback.correct { color: #4ade80; }
        .feedback.wrong { color: #f87171; }
        
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
        
        #menu-overlay, #win-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 40;
            background: rgba(10,18,40,0.98);
        }
        .room-input {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px; border-radius: 8px; width: 240px; text-align: center;
            margin-bottom: 16px; font-size: 18px; outline: none;
        }
        .room-input:focus { border-color: #60a5fa; }
    </style>
</head>
<body>

<div id="root">
    <canvas id="stage"></canvas>

    <!-- Only one of these will be shown based on team -->
    <div class="panel" id="panel-red">
        <div class="panel-label red">Team Red (Top)</div>
        <div class="q-text" id="q-red">Waiting for room...</div>
        <input class="ans-input red" id="inp-red" type="text" placeholder="type answer..." autocomplete="off" />
        <div class="feedback" id="fb-red"></div>
    </div>

    <div class="panel" id="panel-blue">
        <div class="panel-label blue">Team Blue (Bottom)</div>
        <div class="q-text" id="q-blue">Waiting for room...</div>
        <input class="ans-input blue" id="inp-blue" type="text" placeholder="type answer..." autocomplete="off" />
        <div class="feedback" id="fb-blue"></div>
    </div>

    <div id="menu-overlay">
        <h1 class="text-4xl font-bold text-blue-400 mb-2">Multiplayer Prototype</h1>
        <p class="text-gray-400 mb-8">Enter a Room ID to join your teammates.</p>
        <input type="text" id="room-id-input" class="room-input" placeholder="Room ID (e.g. 123)" maxlength="10">
        <button class="bg-blue-600 text-white px-10 py-3 rounded-lg font-bold hover:bg-blue-700 transition" id="join-btn">Join Room</button>
    </div>

    <div id="win-overlay" style="display:none;">
        <h2 class="text-5xl font-black mb-4" id="win-title"></h2>
        <p class="text-gray-400 mb-8">The rope has crossed the goal line!</p>
        <button class="bg-white text-black px-10 py-3 rounded-lg font-bold hover:bg-gray-200 transition" onclick="location.reload()">Back to Menu</button>
    </div>
</div>

<script>
// --- SOCKET & GAME SETUP ---
const socket = io("https://Aloharean-Tug-Of-Quiz.hf.space");

const allQ = [
    {q:"7 + 8",a:"15"},{q:"9 × 6",a:"54"},{q:"100 − 37",a:"63"},{q:"√25",a:"5"},
    {q:"12 × 12",a:"144"},{q:"81 ÷ 9",a:"9"},{q:"6 × 7",a:"42"},{q:"2⁸",a:"256"},
    {q:"Color of a banana?",a:"yellow"},{q:"Capital of France?",a:"paris"},
    {q:"Opposite of 'day'?",a:"night"},{q:"Legs on a cow?",a:"4"},
    {q:"Planets in solar system?",a:"8"},{q:"Fastest land animal?",a:"cheetah"}
];

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;

const game = {
    active: false,
    ropePos: 0,
    targetRopePos: 0,
    winLimit: 180,
    roomId: null,
    myTeam: null, // 'red' or 'blue'
    redCount: 0,
    blueCount: 0,
    currentQ: null,
    scoreRed: 0,
    scoreBlue: 0
};

// --- MULTIPLAYER LOGIC ---
const joinBtn = document.getElementById('join-btn');
const roomIdInput = document.getElementById('room-id-input');

joinBtn.onclick = () => {
    const id = roomIdInput.value.trim();
    if (!id) return;
    game.roomId = id;
    socket.emit('join-room', id);
};

socket.on('init-player', (data) => {
    game.myTeam = data.team;
    game.targetRopePos = data.ropeY;
    game.ropePos = data.ropeY;
    
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('panel-' + game.myTeam).style.display = 'flex';
    
    game.active = true;
    nextQ();
    resize();
    animate();
});

socket.on('room-update', (data) => {
    game.redCount = data.redCount || 1;
    game.blueCount = data.blueCount || 1;
});

socket.on('rope-moved', (newY) => {
    game.targetRopePos = newY;
    if (Math.abs(newY) >= game.winLimit) {
        endGame(newY < 0 ? 'Red' : 'Blue');
    }
});

function nextQ() {
    game.currentQ = allQ[Math.floor(Math.random() * allQ.length)];
    const qEl = document.getElementById('q-' + game.myTeam);
    const inp = document.getElementById('inp-' + game.myTeam);
    const fb = document.getElementById('fb-' + game.myTeam);
    
    qEl.textContent = game.currentQ.q + " = ?";
    inp.value = "";
    fb.textContent = "";
    inp.focus();
}

function checkAns() {
    const inp = document.getElementById('inp-' + game.myTeam);
    const fb = document.getElementById('fb-' + game.myTeam);
    const val = inp.value.trim().toLowerCase();
    
    if (val === game.currentQ.a.toLowerCase()) {
        fb.textContent = "✓ PULL!"; fb.className = "feedback correct";
        socket.emit('pull', { roomId: game.roomId, team: game.myTeam });
        setTimeout(nextQ, 600);
    } else {
        fb.textContent = "✗ WRONG"; fb.className = "feedback wrong";
        inp.value = "";
    }
}

// --- RENDERING ---
function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
}

function drawPlayer(ropeX, y, color, index) {
    const radius = 25;
    const bodyHeight = 45;
    const isLeft = index % 2 === 0;
    const offset = radius + 6;
    const playerX = isLeft ? ropeX - offset : ropeX + offset;
    
    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(playerX - radius, y, radius * 2, bodyHeight, [0, 0, radius, radius]);
    ctx.fill();

    // Head
    ctx.fillStyle = "#E1AD01";
    ctx.beginPath();
    ctx.arc(playerX, y, radius, Math.PI, 0);
    ctx.fill();

    // Hands - Always exactly on the rope
    ctx.fillStyle = "#E1AD01";
    ctx.beginPath(); ctx.arc(ropeX, y + 12, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ropeX, y + 26, 5, 0, Math.PI * 2); ctx.fill();
}

function animate() {
    if (!game.active) return;
    game.ropePos += (game.targetRopePos - game.ropePos) * 0.1;
    ctx.clearRect(0, 0, W, H);
    
    const cx = W / 2;
    const cy = H / 2;
    const ropeY = cy + game.ropePos;

    // Background Grid
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for(let i=0; i<H; i+=50) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    // Goal Lines
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 8]);
    ctx.strokeStyle = "#ef4444";
    ctx.beginPath(); ctx.moveTo(cx - 150, cy - game.winLimit); ctx.lineTo(cx + 150, cy - game.winLimit); ctx.stroke();
    ctx.strokeStyle = "#3b82f6";
    ctx.beginPath(); ctx.moveTo(cx - 150, cy + game.winLimit); ctx.lineTo(cx + 150, cy + game.winLimit); ctx.stroke();
    ctx.setLineDash([]);

    // Rope
    ctx.strokeStyle = "#8B4513";
    ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();

    // Center X
    ctx.fillStyle = "#ff0000";
    ctx.font = "bold 28px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("X", cx, ropeY + 10);

    // Draw Red Team (Above)
    const redStart = ropeY - 100;
    const spacing = 65;
    for (let i = 0; i < game.redCount; i++) {
        drawPlayer(cx, redStart - (i * spacing), "#ef4444", i);
    }

    // Draw Blue Team (Below)
    const blueStart = ropeY + 100 - 45;
    for (let i = 0; i < game.blueCount; i++) {
        drawPlayer(cx, blueStart + (i * spacing), "#3b82f6", i);
    }

    requestAnimationFrame(animate);
}

function endGame(winner) {
    game.active = false;
    const winOverlay = document.getElementById('win-overlay');
    const winTitle = document.getElementById('win-title');
    winOverlay.style.display = 'flex';
    winTitle.textContent = winner + " Team Wins!";
    winTitle.style.color = winner === 'Red' ? '#f87171' : '#60a5fa';
}

// Listeners
document.getElementById('inp-red').onkeydown = e => { if(e.key === 'Enter') checkAns(); };
document.getElementById('inp-blue').onkeydown = e => { if(e.key === 'Enter') checkAns(); };
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
