<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://fav.farm/🪢" />
    <meta charset="UTF-8">
    <title>Tug Of Quiz - Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0a1628; overflow: hidden; color: white; }
        #root { display: flex; height: 100vh; width: 100vw; flex-direction: column; position: relative; }
        
        .panel {
            position: absolute; width: 100%; height: 130px; 
            display: none; flex-direction: row; align-items: center; 
            justify-content: center; padding: 0 40px; z-index: 10; gap: 20px;
            background: rgba(10, 18, 40, 0.9);
        }
        #panel-red { top: 0; border-bottom: 2px solid rgba(239,68,68,0.3); }
        #panel-blue { bottom: 0; border-top: 2px solid rgba(59,130,246,0.3); }

        .ans-input {
            width: 280px; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 12px; font-size: 18px; text-align: center; background: rgba(255,255,255,0.05);
            color: white; outline: none; transition: all 0.2s;
        }
        .ans-input:focus { border-color: #6366f1; }

        #menu-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 40;
            background: rgba(10,18,40,0.98);
        }

        .avatar-option {
            border: 3px solid transparent; cursor: pointer; border-radius: 12px;
            transition: all 0.2s; padding: 10px; background: rgba(255,255,255,0.05);
            text-align: center;
        }
        .avatar-option.selected { border-color: #6366f1; background: rgba(99, 102, 241, 0.2); }
        .avatar-option img { width: 100px; height: 100px; object-fit: contain; }

        canvas { cursor: default; }
    </style>
</head>
<body>

<div id="root">
    <canvas id="stage"></canvas>

    <div class="panel" id="panel-red">
        <div class="text-center mr-4"><div class="q-text font-bold text-lg" id="q-red">---</div></div>
        <input class="ans-input" id="inp-red" type="text" placeholder="Answer..." autocomplete="off" />
    </div>

    <div class="panel" id="panel-blue">
        <div class="text-center mr-4"><div class="q-text font-bold text-lg" id="q-blue">---</div></div>
        <input class="ans-input" id="inp-blue" type="text" placeholder="Answer..." autocomplete="off" />
    </div>

    <div id="menu-overlay">
        <h1 class="text-5xl font-black text-blue-400 mb-6 italic uppercase">Tug Of Quiz</h1>
        
        <p class="text-gray-400 mb-4 uppercase tracking-widest text-xs">Choose Appearance</p>
        <div class="flex gap-6 mb-8">
            <div class="avatar-option selected" id="opt-m" onclick="selectGender('m')">
                <img src="https://i.ibb.co/BV25PGnr/Player-M-Red.webp" alt="Male">
                <p class="text-xs mt-2 font-bold">MALE</p>
            </div>
            <div class="avatar-option" id="opt-f" onclick="selectGender('f')">
                <img src="https://i.ibb.co/hxyvfnmP/Player-F-Red.webp" alt="Female">
                <p class="text-xs mt-2 font-bold">FEMALE</p>
            </div>
        </div>

        <input type="text" id="room-id-input" class="bg-gray-800 border border-gray-700 p-4 rounded-lg text-center mb-4 w-64 text-xl" placeholder="Room ID">
        <button class="bg-blue-600 px-12 py-4 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-700" id="join-btn">Start Game</button>
    </div>

    <div id="win-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.9); z-index:50; flex-direction:column; align-items:center; justify-content:center;">
        <h2 class="text-7xl font-black mb-8 italic" id="win-title"></h2>
        <button class="bg-white text-black px-12 py-4 rounded-full font-bold text-xl" onclick="location.reload()">REPLAY</button>
    </div>
</div>

<script>
// --- CONFIG & SOCKET ---
const socket = io("https://Aloharean-Tug-Of-Quiz.hf.space");
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;

const game = { 
    active: false, ropeX: 0, targetRopeX: 0, winLimit: 250, 
    roomId: null, myTeam: null, redPlayers: [], bluePlayers: [] 
};

const allQ = [{q:"7 + 8",a:"15"},{q:"9 × 6",a:"54"},{q:"100 - 37",a:"63"},{q:"12 × 12",a:"144"},{q:"Capital of France?",a:"paris"}];

// --- ASSET LOADING ---
const images = {};
const assetURLs = {
    'm_red': 'https://i.ibb.co/BV25PGnr/Player-M-Red.webp',
    'f_red': 'https://i.ibb.co/hxyvfnmP/Player-F-Red.webp',
    'm_blue': 'https://i.ibb.co/sXwVPtR/Player-M-Blue.webp',
    'f_blue': 'https://i.ibb.co/hxyvfnmP/Player-F-Blue.webp',
    'rope': 'https://i.ibb.co/wNYsQ9cK/ropefinal.png'
};

for (let key in assetURLs) {
    images[key] = new Image();
    images[key].src = assetURLs[key];
}

// --- SELECTION LOGIC ---
let selectedGender = 'm';
function selectGender(g) {
    selectedGender = g;
    document.getElementById('opt-m').classList.toggle('selected', g === 'm');
    document.getElementById('opt-f').classList.toggle('selected', g === 'f');
}

document.getElementById('join-btn').onclick = () => {
    const id = document.getElementById('room-id-input').value.trim();
    if (!id) return;
    game.roomId = id;
    socket.emit('join-room', { roomId: id, gender: selectedGender });
};

// --- SOCKET EVENTS ---
socket.on('init-player', (data) => {
    game.myTeam = data.team;
    game.targetRopeX = data.ropeX || 0;
    game.ropeX = data.ropeX || 0;
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('panel-' + game.myTeam).style.display = 'flex';
    game.active = true;
    nextQ(); animate();
});

socket.on('room-update', (data) => {
    game.redPlayers = data.redPlayers;
    game.bluePlayers = data.bluePlayers;
});

socket.on('rope-moved', (newX) => {
    game.targetRopeX = newX;
    if (Math.abs(newX) >= game.winLimit) endGame(newX < 0 ? 'Red' : 'Blue');
});

// --- CORE GAMEPLAY ---
function nextQ() {
    game.currentQ = allQ[Math.floor(Math.random() * allQ.length)];
    document.getElementById('q-' + game.myTeam).textContent = game.currentQ.q;
    const inp = document.getElementById('inp-' + game.myTeam);
    inp.value = ""; inp.focus();
}

function checkAns() {
    const inp = document.getElementById('inp-' + game.myTeam);
    if (inp.value.trim().toLowerCase() === game.currentQ.a.toLowerCase()) {
        socket.emit('pull', { roomId: game.roomId, team: game.myTeam });
        nextQ();
    } else { inp.value = ""; }
}

// --- RENDER LOGIC ---
function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
window.onresize = resize; resize();

function drawPlayer(cy, x, team, gender) {
    const pWidth = W / 11;
    const pHeight = pWidth; // 1:1 ratio
    const y = cy - (pHeight / 2);
    const imgKey = `${gender}_${team}`;
    if (images[imgKey] && images[imgKey].complete) {
        ctx.drawImage(images[imgKey], x - pWidth/2, y, pWidth, pHeight);
    }
}

function animate() {
    if (!game.active) return;
    game.ropeX += (game.targetRopeX - game.ropeX) * 0.1;
    ctx.clearRect(0, 0, W, H);
    
    const cx = W/2, cy = H/2, rx = cx + game.ropeX;
    const spacing = W / 12;

    // 1. LAYER: PLAYERS (STAND BEHIND ROPE)
    game.redPlayers.forEach((p, i) => drawPlayer(cy, rx - 150 - (i * spacing), 'red', p.gender));
    game.bluePlayers.forEach((p, i) => drawPlayer(cy, rx + 150 + (i * spacing), 'blue', p.gender));

    // 2. LAYER: THE ROPE
    if (images.rope.complete) {
        const ropeH = (W / 1024) * 128;
        ctx.drawImage(images.rope, 0, cy - ropeH/2, W, ropeH);
    }

    // 3. LAYER: THE HANDS (GRIP ON TOP OF ROPE)
    ctx.fillStyle = "#c18d4c";
    game.redPlayers.forEach((p, i) => {
        const x = rx - 150 - (i * spacing);
        ctx.beginPath(); ctx.arc(x - 15, cy, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 15, cy, 7, 0, Math.PI*2); ctx.fill();
    });
    game.bluePlayers.forEach((p, i) => {
        const x = rx + 150 + (i * spacing);
        ctx.beginPath(); ctx.arc(x - 15, cy, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 15, cy, 7, 0, Math.PI*2); ctx.fill();
    });

    // 4. LAYER: CENTER MARKER
    ctx.fillStyle = "red"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
    ctx.fillText("X", rx, cy + 15);

    requestAnimationFrame(animate);
}

function endGame(winner) {
    game.active = false;
    document.getElementById('win-overlay').style.display = 'flex';
    const wt = document.getElementById('win-title');
    wt.textContent = winner.toUpperCase() + " WINS!";
    wt.style.color = winner === 'Red' ? '#ef4444' : '#3b82f6';
}

document.getElementById('inp-red').onkeydown = e => { if(e.key === 'Enter') checkAns(); };
document.getElementById('inp-blue').onkeydown = e => { if(e.key === 'Enter') checkAns(); };
</script>
</body>
</html>
