<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://fav.farm/🪢" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tug of Quiz - Horizontal Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0a1628; overflow: hidden; }
        #root { display: flex; height: 100vh; width: 100vw; flex-direction: column; position: relative; }
        
        /* Layout: Top UI, Center Game, Bottom UI */
        .panel {
            position: absolute; width: 100%; height: 120px; 
            display: none; flex-direction: row; align-items: center; 
            justify-content: center; padding: 0 40px; z-index: 10; gap: 20px;
            background: rgba(10, 18, 40, 0.9);
        }
        #panel-red { top: 0; border-bottom: 2px solid rgba(239,68,68,0.3); }
        #panel-blue { bottom: 0; border-top: 2px solid rgba(59,130,246,0.3); }

        .ans-input {
            width: 300px; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 12px; font-size: 18px; text-align: center; background: rgba(255,255,255,0.05);
            color: #ffffff; outline: none;
        }
        .ans-input.red:focus { border-color: #ef4444; }
        .ans-input.blue:focus { border-color: #3b82f6; }

        #menu-overlay, #win-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 40;
            background: rgba(10,18,40,0.98); color: white;
        }
        .room-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; }
    </style>
</head>
<body>

<div id="root">
    <canvas id="stage"></canvas>

    <div class="panel" id="panel-red">
        <div class="bg-red-500/20 text-red-300 px-4 py-2 rounded-full font-bold text-xs uppercase">Team Red</div>
        <div class="q-text text-white font-bold" id="q-red">---</div>
        <input class="ans-input red" id="inp-red" type="text" placeholder="Answer..." autocomplete="off" />
        <div class="feedback" id="fb-red"></div>
    </div>

    <div class="panel" id="panel-blue">
        <div class="bg-blue-500/20 text-blue-300 px-4 py-2 rounded-full font-bold text-xs uppercase">Team Blue</div>
        <div class="q-text text-white font-bold" id="q-blue">---</div>
        <input class="ans-input blue" id="inp-blue" type="text" placeholder="Answer..." autocomplete="off" />
        <div class="feedback" id="fb-blue"></div>
    </div>

    <div id="menu-overlay">
        <h1 class="text-4xl font-bold text-blue-400 mb-4">Horizontal Tug</h1>
        <input type="text" id="room-id-input" class="room-input" placeholder="Room ID">
        <button class="bg-blue-600 px-10 py-3 rounded-lg font-bold" id="join-btn">Join Match</button>
    </div>

    <div id="win-overlay" style="display:none;">
        <h2 class="text-5xl font-black mb-4" id="win-title"></h2>
        <button class="bg-white text-black px-10 py-3 rounded-lg font-bold" onclick="location.reload()">Replay</button>
    </div>
</div>

<script>
const socket = io("https://Aloharean-Tug-Of-Quiz.hf.space");

// --- ASSET LOADING ---
const imgAssets = {
    redBody: "https://your-image-url-for-red-body.png",
    blueBody: "https://your-image-url-for-blue-body.png",
    head: "https://your-image-url-for-mustard-head.png",
    hand: "https://your-image-url-for-mustard-hand.png"
};
const images = {};
Object.keys(imgAssets).forEach(key => {
    images[key] = new Image();
    images[key].src = imgAssets[key];
});

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;

const game = {
    active: false,
    ropeX: 0, // Now tracking X for horizontal
    targetRopeX: 0,
    winLimit: 250,
    myTeam: null,
    redCount: 0,
    blueCount: 0,
    currentQ: null
};

// ... (Socket logic join-room, init-player, room-update remain similar) ...
// NOTE: Make sure your socket 'pull' logic on HF subtracts for Red (left) and adds for Blue (right)

function drawPlayer(ropeY, x, color, index, team) {
    const radius = 25;
    const bodyHeight = 50;
    
    // Alternating vertically along the rope
    const isAbove = index % 2 === 0;
    const offset = radius + 5;
    const playerY = isAbove ? ropeY - (offset + bodyHeight/2) : ropeY + offset;

    // 1. Draw Body
    ctx.fillStyle = (team === 'red') ? "#ef4444" : "#3b82f6";
    // If you use images: ctx.drawImage(images.redBody, x - radius, playerY, radius*2, bodyHeight);
    ctx.beginPath();
    ctx.roundRect(x - radius, playerY, radius * 2, bodyHeight, [radius, radius, radius, radius]);
    ctx.fill();

    // 2. Draw Head (Mustard Upper Semicircle)
    ctx.fillStyle = "#E1AD01";
    ctx.beginPath();
    ctx.arc(x, playerY, radius, Math.PI, 0);
    ctx.fill();

    // 3. Draw Hands (Mustard circles LOCKED to the rope center)
    ctx.beginPath(); ctx.arc(x - 12, ropeY, 6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 12, ropeY, 6, 0, Math.PI * 2); ctx.fill();
}

function animate() {
    if (!game.active) return;
    game.ropeX += (game.targetRopeX - game.ropeX) * 0.1;
    ctx.clearRect(0, 0, W, H);
    
    const cx = W / 2;
    const cy = H / 2;
    const ropeX = cx + game.ropeX;

    // Horizontal Rope
    ctx.strokeStyle = "#8B4513";
    ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();

    // Goal Lines (Vertical now)
    ctx.strokeStyle = "#ef4444";
    ctx.beginPath(); ctx.moveTo(cx - game.winLimit, cy - 100); ctx.lineTo(cx - game.winLimit, cy + 100); ctx.stroke();
    ctx.strokeStyle = "#3b82f6";
    ctx.beginPath(); ctx.moveTo(cx + game.winLimit, cy - 100); ctx.lineTo(cx + game.winLimit, cy + 100); ctx.stroke();

    // Center X
    ctx.fillStyle = "red"; ctx.font = "bold 30px sans-serif";
    ctx.fillText("X", ropeX, cy + 10);

    // Draw Red Team (Left side of X)
    const spacing = 70;
    for (let i = 0; i < game.redCount; i++) {
        drawPlayer(cy, ropeX - 120 - (i * spacing), "#ef4444", i, 'red');
    }

    // Draw Blue Team (Right side of X)
    for (let i = 0; i < game.blueCount; i++) {
        drawPlayer(cy, ropeX + 120 + (i * spacing), "#3b82f6", i, 'blue');
    }

    requestAnimationFrame(animate);
}

// ... (Resize and Input listeners) ...
</script>
</body>
</html>
