<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://fav.farm/🪢" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tug Of Quiz - Match Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0a1628; overflow: hidden; color: white; }
        
        /* HUD Styles */
        #match-hud {
            position: absolute; top: 0; width: 100%; height: 100px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: linear-gradient(to bottom, rgba(10,22,40,0.9), transparent);
            z-index: 20;
        }
        .team-name-display { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }
        .score-dots { display: flex; gap: 8px; margin-top: 4px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
        .dot.active.red { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .dot.active.blue { background: #3b82f6; border-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; }

        #timer-box { background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        #timer-display { font-family: monospace; font-size: 2.5rem; font-weight: bold; }

        /* Input Panels */
        .input-panel {
            position: absolute; width: 100%; height: 120px; 
            display: none; align-items: center; justify-content: center; 
            z-index: 10; gap: 20px; background: rgba(10, 18, 40, 0.9);
        }
        #panel-red { top: 100px; border-bottom: 2px solid #ef4444; }
        #panel-blue { bottom: 0; border-top: 2px solid #3b82f6; }
        .ans-input { width: 300px; padding: 12px; border-radius: 8px; background: #1a2638; color: white; border: 1px solid #334155; text-align: center; font-size: 1.2rem; outline: none; }

        #setup-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: #0a1628; }
        #announcer { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-size: 5rem; font-weight: 900; font-style: italic; }
    </style>
</head>
<body>

<div id="setup-overlay">
    <h1 class="text-4xl font-black mb-6 text-blue-400">MATCH SETUP</h1>
    <div class="flex flex-col gap-4 w-80">
        <input type="text" id="player-name-input" class="bg-gray-800 p-4 rounded-lg outline-none border border-gray-700" placeholder="Display Name">
        <input type="text" id="team-id-input" class="bg-gray-800 p-4 rounded-lg outline-none border border-gray-700" placeholder="Team ID (from Hub)">
        <button id="ready-btn" class="bg-blue-600 p-4 rounded-lg font-bold hover:bg-blue-500 transition">JOIN ARENA</button>
    </div>
</div>

<div id="match-hud">
    <div class="flex flex-col items-center">
        <div id="display-name-red" class="team-name-display text-red-500">Waiting...</div>
        <div class="score-dots" id="dots-red"><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div id="timer-box"><div id="timer-display">03:00</div></div>
    <div class="flex flex-col items-center">
        <div id="display-name-blue" class="team-name-display text-blue-500">Waiting...</div>
        <div class="score-dots" id="dots-blue"><div class="dot"></div><div class="dot"></div></div>
    </div>
</div>

<div id="announcer">ROUND 1</div>

<canvas id="stage"></canvas>

<div class="input-panel" id="panel-red">
    <div id="q-red" class="font-bold mr-4">---</div>
    <input class="ans-input" id="inp-red" type="text" placeholder="Answer..." autocomplete="off" />
</div>

<div class="input-panel" id="panel-blue">
    <div id="q-blue" class="font-bold mr-4">---</div>
    <input class="ans-input" id="inp-blue" type="text" placeholder="Answer..." autocomplete="off" />
</div>

<script>
const socket = io("https://Aloharean-Tug-Of-Quiz.hf.space");
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;

const match = {
    active: false,
    timer: 180,
    currentRound: 1,
    team1: { name: "Red Team", wins: 0, time: 0 },
    team2: { name: "Blue Team", wins: 0, time: 0 },
    ropeX: 0, targetRopeX: 0, winLimit: 250,
    myTeam: null
};

// AUTO-FILL FROM HUB
window.onload = () => {
    const savedID = localStorage.getItem('currentTeamID');
    if(savedID) document.getElementById('team-id-input').value = savedID;
    resize();
    animate(); // Start the loop immediately so it's not a black screen
};

document.getElementById('ready-btn').onclick = () => {
    const name = document.getElementById('player-name-input').value.trim();
    const tid = document.getElementById('team-id-input').value.trim().toUpperCase();
    
    if(!name || !tid) return alert("Please provide both name and ID.");
    
    match.myTeam = (Math.random() > 0.5) ? 'red' : 'blue'; // Mock team assignment
    document.getElementById('setup-overlay').style.display = 'none';
    
    // Announce the team names properly
    document.getElementById('display-name-red').textContent = localStorage.getItem('currentTeamName') || "Team Red";
    
    startRound();
};

function startRound() {
    match.active = true;
    match.timer = 180;
    match.ropeX = 0; match.targetRopeX = 0;
    
    document.getElementById('panel-' + match.myTeam).style.display = 'flex';
    announce(`ROUND ${match.currentRound}`, 2000);

    const tick = setInterval(() => {
        if (!match.active) { clearInterval(tick); return; }
        match.timer--;
        updateTimerUI();
        if (match.timer <= 0) endRound(null);
    }, 1000);
}

function updateTimerUI() {
    const m = Math.floor(match.timer / 60);
    const s = match.timer % 60;
    document.getElementById('timer-display').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function announce(msg, dur) {
    const el = document.getElementById('announcer');
    el.textContent = msg; el.style.opacity = 1;
    setTimeout(() => el.style.opacity = 0, dur);
}

function endRound(winner) {
    match.active = false;
    let timeSpent = 180 - match.timer;
    match.team1.time += timeSpent;
    match.team2.time += timeSpent;

    if(winner) {
        match[winner === 'red' ? 'team1' : 'team2'].wins++;
        updateDots(winner);
        announce(`${winner.toUpperCase()} WINS ROUND!`, 2000);
    }

    setTimeout(() => {
        if(match.team1.wins === 2 || match.team2.wins === 2) {
            announce("MATCH OVER!", 5000);
        } else {
            match.currentRound++;
            startRound();
        }
    }, 2500);
}

function updateDots(team) {
    const dots = document.getElementById(`dots-${team}`).children;
    const wins = team === 'red' ? match.team1.wins : match.team2.wins;
    for(let i=0; i<wins; i++) dots[i].classList.add('active', team);
}

function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
window.onresize = resize;

function animate() {
    ctx.clearRect(0, 0, W, H);
    const cx = W/2, cy = H/2;
    
    match.ropeX += (match.targetRopeX - match.ropeX) * 0.1;
    const rx = cx + match.ropeX;

    // Draw Rope
    ctx.strokeStyle = "#8B4513"; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
    
    // Center Marker
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(rx, cy, 12, 0, Math.PI*2); ctx.fill();

    // Goal Lines
    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = "rgba(239,68,68,0.5)"; ctx.strokeRect(cx - match.winLimit, cy-100, 2, 200);
    ctx.strokeStyle = "rgba(59,130,246,0.5)"; ctx.strokeRect(cx + match.winLimit, cy-100, 2, 200);
    ctx.setLineDash([]);

    requestAnimationFrame(animate);
}

// Logic for pulling (mocking movement)
window.onkeydown = (e) => {
    if(!match.active) return;
    if(e.key === 'Enter') {
        const move = match.myTeam === 'red' ? -20 : 20;
        match.targetRopeX += move;
        if(Math.abs(match.targetRopeX) >= match.winLimit) endRound(match.targetRopeX < 0 ? 'red' : 'blue');
    }
}
</script>
</body>
</html>
