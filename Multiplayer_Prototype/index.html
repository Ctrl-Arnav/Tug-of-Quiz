<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tug Of Quiz - Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a1628; overflow: hidden; color: white; }
        .panel { position: absolute; width: 100%; height: 130px; display: none; align-items: center; justify-content: center; z-index: 10; background: rgba(10, 18, 40, 0.9); }
        #panel-red { top: 0; border-bottom: 2px solid #ef4444; }
        #panel-blue { bottom: 0; border-top: 2px solid #3b82f6; }
        .ans-input { width: 280px; padding: 12px; border-radius: 12px; text-align: center; background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); outline: none; }
    </style>
</head>
<body>
    <canvas id="stage"></canvas>

    <div id="panel-red" class="panel">
        <div class="text-center mr-4"><div id="name-red" class="text-red-400 font-bold uppercase text-xs">Waiting...</div><div id="q-red" class="text-xl font-bold">---</div></div>
        <input type="text" id="inp-red" class="ans-input" placeholder="Answer..." />
    </div>

    <div id="panel-blue" class="panel">
        <div class="text-center mr-4"><div id="name-blue" class="text-blue-400 font-bold uppercase text-xs">Waiting...</div><div id="q-blue" class="text-xl font-bold">---</div></div>
        <input type="text" id="inp-blue" class="ans-input" placeholder="Answer..." />
    </div>

    <div id="entry-overlay" class="absolute inset-0 bg-[#0a1628] flex flex-col items-center justify-center z-50">
        <h1 class="text-4xl font-black text-blue-400 mb-6 italic">ARENA</h1>
        <input type="text" id="r-in" class="p-3 bg-gray-800 rounded mb-2 w-64" placeholder="Room ID">
        <input type="text" id="t-in" class="p-3 bg-gray-800 rounded mb-4 w-64" placeholder="Team ID">
        <button onclick="join()" class="bg-blue-600 px-10 py-3 rounded font-bold">START</button>
    </div>

    <script>
        const socket = io("https://Aloharean-Tug-Of-Quiz.hf.space");
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        let W, H, mySide, curQ;
        const game = { active: false, ropeX: 0, targetRopeX: 0, redC: 0, blueC: 0 };

        function join() {
            socket.emit("join-attempt", { room: document.getElementById('r-in').value, teamID: document.getElementById('t-in').value.toUpperCase() });
        }

        socket.on("join-response", res => {
            if(!res.success) return alert(res.message);
            mySide = res.side;
            document.getElementById('name-red').innerText = res.redName;
            document.getElementById('name-blue').innerText = res.blueName;
            document.getElementById('entry-overlay').style.display = 'none';
        });

        socket.on("start-match", data => {
            game.active = true;
            game.redC = data.redCount; game.blueC = data.blueCount;
            curQ = data.question;
            document.getElementById('panel-' + mySide).style.display = 'flex';
            document.getElementById('q-' + mySide).innerText = curQ.q;
            resize(); animate();
        });

        socket.on("rope-moved", data => { game.targetRopeX = data.ropeX; });

        socket.on("round-end", data => {
            alert(data.winner.toUpperCase() + " WINS ROUND!");
            game.ropeX = 0; game.targetRopeX = 0;
        });

        function check() {
            const inp = document.getElementById('inp-' + mySide);
            // Fix: Normalize both values to strings to allow numeric answers
            if (inp.value.toString().trim().toLowerCase() === curQ.a.toString().toLowerCase()) {
                socket.emit("pull", { room: document.getElementById('r-in').value, team: mySide });
                inp.value = "";
            } else { inp.value = ""; }
        }

        function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
        window.onresize = resize;

        function animate() {
            if (!game.active) return;
            game.ropeX += (game.targetRopeX - game.ropeX) * 0.1;
            ctx.clearRect(0, 0, W, H);
            const cx = W/2, cy = H/2, rx = cx + game.ropeX;
            ctx.strokeStyle = "#8B4513"; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(rx, cy, 10, 0, Math.PI*2); ctx.fill();
            
            const drawP = (x, color) => {
                ctx.fillStyle = color; ctx.fillRect(x - 20, cy - 60, 40, 50);
                ctx.fillStyle = "#E1AD01"; ctx.beginPath(); ctx.arc(x, cy - 60, 20, Math.PI, 0); ctx.fill();
            };
            if(game.redC) drawP(rx - 80, "#ef4444");
            if(game.blueC) drawP(rx + 80, "#3b82f6");
            requestAnimationFrame(animate);
        }

        document.getElementById('inp-red').onkeydown = e => { if(e.key==='Enter') check(); };
        document.getElementById('inp-blue').onkeydown = e => { if(e.key==='Enter') check(); };
    </script>
</body>
</html>
