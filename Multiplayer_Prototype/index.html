<script>

const socket = io("https://Aloharean-Tug-Of-Quiz.hf.space");


const allQ = [
    {q:"7 + 8",a:"15"},{q:"9 × 6",a:"54"},{q:"100 − 37",a:"63"},{q:"√25",a:"5"},
    {q:"12 × 12",a:"144"},{q:"Capital of France?",a:"paris"},
    {q:"Legs on a spider?",a:"8"},{q:"Months in a year?",a:"12"}
];

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;

const game = {
    active: false,
    ropeX: 0,
    targetRopeX: 0,
    winLimit: 300,
    roomId: null,
    myTeam: null,
    redCount: 0,
    blueCount: 0,

        endGame(newX < 0 ? 'Red' : 'Blue');
    }
});


function nextQ() {

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;







}



function drawPlayer(ropeY, x, teamColor, index) {
    const radius = 25, bodyH = 50;
    const isAbove = index % 2 === 0;
    // Position body relative to ropeY
    const playerY = isAbove ? ropeY - (bodyH + 5) : ropeY + 5;

    // Body
    ctx.fillStyle = teamColor;
    ctx.beginPath();
    ctx.roundRect(x - radius, playerY, radius * 2, bodyH, [10, 10, 10, 10]);
    ctx.fill();

    // Head (Mustard Upper Semicircle)
    ctx.fillStyle = "#E1AD01";
    ctx.beginPath();
    // Head orientation flips if player is below rope
    if (isAbove) {
        ctx.arc(x, playerY, radius, Math.PI, 0);
    } else {
        ctx.arc(x, playerY + bodyH, radius, 0, Math.PI);
    }
    ctx.fill();

    // Hands (Mustard circles on rope)
    ctx.beginPath(); ctx.arc(x - 10, ropeY, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 10, ropeY, 6, 0, Math.PI*2); ctx.fill();


}

function animate() {
    if (!game.active) return;


    game.ropeX += (game.targetRopeX - game.ropeX) * 0.1;
    ctx.clearRect(0, 0, W, H);

    const cx = W / 2, cy = H / 2;
    const rX = cx + game.ropeX;

    // Draw Grid
    ctx.strokeStyle = "rgba(255,255,255,0.02)"; ctx.lineWidth = 1;
    for(let i=0; i<W; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }

    // Win Boundaries
    ctx.lineWidth = 4; ctx.setLineDash([10, 10]);
    ctx.strokeStyle = "#ef4444"; ctx.beginPath(); ctx.moveTo(cx - game.winLimit, cy - 100); ctx.lineTo(cx - game.winLimit, cy + 100); ctx.stroke();
    ctx.strokeStyle = "#3b82f6"; ctx.beginPath(); ctx.moveTo(cx + game.winLimit, cy - 100); ctx.lineTo(cx + game.winLimit, cy + 100); ctx.stroke();
    ctx.setLineDash([]);

    // Rope
    ctx.strokeStyle = "#8B4513"; ctx.lineWidth = 12;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();

    // Marker X
    ctx.fillStyle = "red"; ctx.font = "black 40px Arial"; ctx.textAlign = "center";
    ctx.fillText("X", rX, cy + 15);

    // Players
    const spacing = 75;
    for(let i=0; i<game.redCount; i++) drawPlayer(cy, rX - 100 - (i*spacing), "#ef4444", i);
    for(let i=0; i<game.blueCount; i++) drawPlayer(cy, rX + 100 + (i*spacing), "#3b82f6", i);


    requestAnimationFrame(animate);
}

function endGame(winner) {
    game.active = false;
    document.getElementById('win-overlay').style.display = 'flex';
    const wt = document.getElementById('win-title');
    wt.textContent = winner.toUpperCase() + " WINS!";
    wt.style.color = winner === 'Red' ? '#f87171' : '#60a5fa';
}

</script>
