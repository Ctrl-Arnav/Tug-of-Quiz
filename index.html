<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://fav.farm/🪢" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tug of War - Hub & Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a1628; color: white; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .stat-card { background: rgba(0, 0, 0, 0.2); border-radius: 8px; padding: 10px; text-align: center; }
    </style>
</head>
<body class="min-h-screen p-8 flex flex-col items-center">
    
    <header class="text-center mb-12">
        <h1 class="text-6xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-red-500 uppercase tracking-tighter">
            Tug Of Quiz
        </h1>
        <p class="text-gray-400 mt-2 font-medium tracking-widest uppercase text-xs">Global Team Hub & Registry</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 w-full max-w-7xl">
        
        <div class="glass-panel p-8 rounded-2xl flex flex-col">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span class="text-blue-400">01.</span> Register Team
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs uppercase text-gray-500 font-bold mb-2 block">Team Name</label>
                    <input type="text" id="new-team-name" placeholder="Enter name..." 
                        class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none focus:border-blue-500 transition">
                </div>
                <button onclick="generateTeamID()" 
                    class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold uppercase tracking-wider transition shadow-lg">
                    Create Team & Get ID
                </button>
            </div>

            <div id="id-result" class="mt-8 p-6 bg-blue-500/10 border border-blue-500/30 rounded-xl hidden text-center">
                <p class="text-sm text-blue-300 uppercase font-bold">Your Unique ID</p>
                <h3 id="display-id" class="text-5xl font-black my-2 tracking-widest text-white">----</h3>
                <p class="text-xs text-gray-400">Share this ID with your teammates to join the room!</p>
            </div>
        </div>

        <div class="lg:col-span-2 glass-panel p-8 rounded-2xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span class="text-red-400">02.</span> Global Leaderboard
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 uppercase text-xs border-b border-gray-800">
                            <th class="pb-4 font-bold">Rank</th>
                            <th class="pb-4 font-bold">Team (Name)</th>
                            <th class="pb-4 font-bold">Matches Won</th>
                            <th class="pb-4 font-bold">In-Round Time</th>
                            <th class="pb-4 font-bold text-blue-400">Avg Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr class="border-b border-gray-800/50 hover:bg-white/5 transition">
                            <td class="py-4 font-black">#1</td>
                            <td class="py-4">
                                <span class="font-bold block">Alpha Squad</span>
                                <span class="text-[10px] text-gray-500">ID: A7B2</span>
                            </td>
                            <td class="py-4">12</td>
                            <td class="py-4">450s</td>
                            <td class="py-4 font-bold text-blue-400">37.5s</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div class="mt-12 flex gap-4">
        <a href="../Multiplayer_Prototype/index.html" class="px-8 py-3 bg-white text-black font-black rounded-full hover:scale-105 transition">
            ENTER MATCH ARENA
        </a>
        <a href="../Concept_Demo/index.html" class="px-8 py-3 border border-gray-700 font-bold rounded-full hover:bg-white/5 transition">
            LOCAL DEMO
        </a>
    </div>

    <script>
        // Mock Database for Local Logic
        const teamRegistry = {
            "A7B2": { name: "Alpha Squad", matches: 12, totalTime: 450 },
            "X9P1": { name: "Byte Brawlers", matches: 8, totalTime: 320 }
        };

        function generateTeamID() {
            const nameInput = document.getElementById('new-team-name');
            const name = nameInput.value.trim();
            
            if (!name) {
                alert("Please enter a team name first!");
                return;
            }

            // Generate 4-char Alphanumeric ID
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let result = "";
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            // Update UI
            document.getElementById('display-id').innerText = result;
            document.getElementById('id-result').classList.remove('hidden');
            
            // Add to Registry (In real app, this sends to Backend)
            teamRegistry[result] = { name: name, matches: 0, totalTime: 0 };
            updateLeaderboard();
            
            nameInput.value = "";
        }

        function updateLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = "";

            // Convert object to array for sorting
            const sortedTeams = Object.entries(teamRegistry).map(([id, data]) => ({
                id, ...data,
                avg: data.matches > 0 ? (data.totalTime / data.matches).toFixed(1) : "0.0"
            })).sort((a, b) => b.matches - a.matches); // Sort by matches won

            sortedTeams.forEach((team, index) => {
                const row = `
                    <tr class="border-b border-gray-800/50 hover:bg-white/5 transition">
                        <td class="py-4 font-black">#${index + 1}</td>
                        <td class="py-4">
                            <span class="font-bold block">${team.name}</span>
                            <span class="text-[10px] text-gray-500">ID: ${team.id}</span>
                        </td>
                        <td class="py-4">${team.matches}</td>
                        <td class="py-4">${team.totalTime}s</td>
                        <td class="py-4 font-bold text-blue-400">${team.avg}s</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // Initialize
        updateLeaderboard();
    </script>
</body>
</html>
