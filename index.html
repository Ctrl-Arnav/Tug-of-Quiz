<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tug of War - Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-[#0a1628] text-white p-10">
    <h1 class="text-4xl font-black text-center text-blue-400 mb-10 italic">TUG OF WAR HUB</h1>
    
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
            <h2 class="text-xl font-bold mb-4">Register Team</h2>
            <input type="text" id="t-name" class="w-full p-3 bg-gray-900 rounded mb-4" placeholder="Team Name">
            <button onclick="create()" class="w-full bg-blue-600 p-3 rounded font-bold uppercase">Create</button>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
            <h2 class="text-xl font-bold mb-4">Available Teams & Codes</h2>
            <div id="team-list" class="space-y-2"></div>
        </div>
    </div>

    <div class="text-center mt-10"><a href="./Multiplayer_Prototype/index.html" class="bg-white text-black px-10 py-4 rounded-full font-bold">ENTER ARENA</a></div>

    <script>
        const socket = io("https://Aloharean-Tug-Of-Quiz.hf.space");
        function create() { socket.emit("hub-create-team", { name: document.getElementById('t-name').value }); }
        function del(id) { socket.emit("hub-delete-team", id); }

        socket.on("update-leaderboard", (teams) => {
            const list = document.getElementById('team-list');
            list.innerHTML = "";
            Object.values(teams).forEach(t => {
                list.innerHTML += `
                <div class="flex justify-between items-center bg-black/30 p-2 rounded">
                    <span>${t.name} <b class="text-yellow-400 ml-2">${t.id}</b></span>
                    <button onclick="del('${t.id}')" class="text-red-500 text-xs font-bold uppercase">Delete</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
